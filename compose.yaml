services:
 app:
   build:
     context: .
     dockerfile: docker/php/Dockerfile
   container_name: yii3_app
   ports:
     - "${APP_PORT}:80"
   volumes:
     - ./:/var/www/html
   environment:
    DB_HOST: ${DB_HOST}
    DB_PORT: ${DB_PORT}
    DB_NAME: ${DB_NAME}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
   depends_on:
     - db
 db:
   image: mysql:8.4
   container_name: yii3_db
   restart: unless-stopped
   environment:
     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
     MYSQL_DATABASE: ${DB_NAME}
     MYSQL_USER: ${DB_USER}
     MYSQL_PASSWORD: ${DB_PASSWORD}
   ports:
     - "${DB_PORT_EXTERNAL}:3306"
   volumes:
     - mysql_data:/var/lib/mysql
volumes:
 mysql_data:
